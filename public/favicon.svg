<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <!-- Admin Panel Favicon: Gear + Monitor -->
  <!-- Monitor body -->
  <rect x="6" y="4" width="20" height="15" rx="2.5" fill="none" stroke="#1a73e8" stroke-width="2"/>
  <!-- Monitor stand -->
  <path d="M13 19v3h6v-3" fill="none" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="11" y1="22" x2="21" y2="22" stroke="#1a73e8" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Gear on screen -->
  <circle cx="16" cy="11" r="3" fill="none" stroke="#1a73e8" stroke-width="1.5"/>
  <circle cx="16" cy="11" r="1" fill="#1a73e8"/>
  <!-- Gear teeth -->
  <g stroke="#1a73e8" stroke-width="1.3" stroke-linecap="round">
    <line x1="16" y1="6.5" x2="16" y2="7.5"/>
    <line x1="16" y1="14.5" x2="16" y2="15.5"/>
    <line x1="11.5" y1="11" x2="12.5" y2="11"/>
    <line x1="19.5" y1="11" x2="20.5" y2="11"/>
    <line x1="12.8" y1="7.8" x2="13.5" y2="8.5"/>
    <line x1="18.5" y1="13.5" x2="19.2" y2="14.2"/>
    <line x1="19.2" y1="7.8" x2="18.5" y2="8.5"/>
    <line x1="13.5" y1="13.5" x2="12.8" y2="14.2"/>
  </g>
  <!-- Small status dots on bottom of monitor -->
  <circle cx="10" cy="17" r="0.8" fill="#1a73e8" opacity="0.5"/>
  <circle cx="12.5" cy="17" r="0.8" fill="#1a73e8" opacity="0.3"/>
</svg>