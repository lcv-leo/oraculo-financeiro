# Módulo: .github/dependabot.yml (v2.0.0)
version: 2
updates:
  # ---------------------------------------------------------
  # 1. INFRAESTRUTURA: Esteiras de CI/CD (GitHub Actions)
  # ---------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly" # Reduzido para semanal: Actions mudam com menor frequência
      day: "monday"
      time: "09:00"
      timezone: "America/Sao_Paulo"
    labels:
      - "ci-cd"
      - "github-actions"
      - "security"
    assignees:
      - "lcv-leo" # Atribui o PR diretamente ao seu usuário
    commit-message:
      prefix: "ci"
      include: "scope"
    open-pull-requests-limit: 5

  # ---------------------------------------------------------
  # 2. SOFTWARE: Dependências do Projeto (NPM/Node.js)
  # ---------------------------------------------------------
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "06:00" # Roda antes do início do seu dia útil
      timezone: "America/Sao_Paulo"
    labels:
      - "dependencies"
      - "npm"
    assignees:
      - "lcv-leo"
    
    # Padronização de Commits
    commit-message:
      prefix: "chore"
      include: "scope"
    
    # Estratégia de Versionamento: Altera o package.json apenas se o range não cobrir a versão nova
    versioning-strategy: increase
    
    # Agrupamento: Consolida atualizações em lotes lógicos
    groups:
      # Grupo 1: Ferramentas de desenvolvimento e tipagem rodam juntas em 1 único PR
      dev-dependencies:
        patterns:
          - "eslint*"
          - "vite*"
          - "typescript"
          - "@types/*"
          - "wrangler"
        update-types:
          - "minor"
          - "patch"
      
    # Controle Anti-Regressão (Zero Trust)
    ignore:
      # Ignora atualizações Major do React e React-DOM para evitar quebra de interface autônoma
      - dependency-name: "react"
        update-types: ["version-update:semver-major"]
      - dependency-name: "react-dom"
        update-types: ["version-update:semver-major"]

    open-pull-requests-limit: 10