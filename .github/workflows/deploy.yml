name: Deploy

on:
  push:
    branches: [main]

env:
  WRANGLER_VERSION: "latest"

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: latest
          cache: npm

      - run: npm ci
      - run: npm run build

      - run: npx wrangler@${WRANGLER_VERSION} pages deploy dist --project-name oraculo-financeiro --branch production
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
