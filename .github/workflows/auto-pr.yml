name: Auto PR

on:
  workflow_run:
    workflows:
      - Auto PR Request
    types: [completed]

permissions:
  contents: read

concurrency:
  group: auto-pr-${{ github.repository }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  open-pr:
    name: Open automation PR
    if: >-
      ${{
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_repository.full_name == github.repository &&
        github.event.workflow_run.head_branch != 'main' &&
        !startsWith(github.event.workflow_run.head_branch, 'dependabot/') &&
        !startsWith(github.event.workflow_run.head_branch, 'renovate/')
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Open or update signed automation PR
        env:
          LCV_AUTOMATION_TOKEN: ${{ secrets.LCV_AUTOMATION_TOKEN }}
          LCV_AUTOMATION_HMAC_KEY: ${{ secrets.LCV_AUTOMATION_HMAC_KEY }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          node --input-type=module <<'NODE'
          import crypto from "node:crypto";

          const token = process.env.LCV_AUTOMATION_TOKEN;
          const hmacKey = process.env.LCV_AUTOMATION_HMAC_KEY;
          const repoFull = process.env.REPO;
          const branch = process.env.BRANCH;
          const headSha = process.env.HEAD_SHA;

          if (!token || !hmacKey) {
            throw new Error("LCV_AUTOMATION_TOKEN and LCV_AUTOMATION_HMAC_KEY must be configured.");
          }

          const [owner, repo] = repoFull.split("/");
          const markerRegex = /<!-- lcv-auto-pr:v3 (\{.*?\}) -->/g;
          const takeoverWarningMarker = "<!-- lcv-auto-pr:takeover-warning -->";
          const placeholderBody = "Preparing signed LCV automation marker.";

          function canonicalJson(value) {
            const sorted = {};
            for (const key of Object.keys(value).sort()) {
              sorted[key] = value[key];
            }
            return JSON.stringify(sorted);
          }

          function sign(payload) {
            return `hmac-sha256:${crypto.createHmac("sha256", hmacKey).update(canonicalJson(payload)).digest("hex")}`;
          }

          function extractMarkers(body) {
            return [...(body || "").matchAll(markerRegex)].map((match) => {
              try {
                return JSON.parse(match[1]);
              } catch {
                return null;
              }
            });
          }

          function markerIsRefreshable(pr) {
            const markers = extractMarkers(pr.body);
            if (markers.length !== 1 || !markers[0]) {
              return false;
            }

            const marker = markers[0];
            const { sig, ...unsigned } = marker;
            if (!sig || sign(unsigned) !== sig) {
              return false;
            }

            return (
              marker.repo === repoFull &&
              marker.pr_number === pr.number &&
              marker.pr_node_id === pr.node_id &&
              marker.base === "main" &&
              marker.head_branch === branch &&
              marker.source === "branch-push"
            );
          }

          function isRecoverablePlaceholder(pr, automationLogin) {
            return pr.user?.login === automationLogin && (pr.body || "").trim() === placeholderBody;
          }

          async function api(path, options = {}) {
            const response = await fetch(`https://api.github.com${path}`, {
              ...options,
              headers: {
                Accept: "application/vnd.github+json",
                Authorization: `Bearer ${token}`,
                "Content-Type": "application/json",
                "X-GitHub-Api-Version": "2022-11-28",
                ...(options.headers || {}),
              },
            });

            const text = await response.text();
            const body = text ? JSON.parse(text) : null;
            if (!response.ok) {
              throw new Error(`${options.method || "GET"} ${path} failed: ${response.status} ${text}`);
            }
            return body;
          }

          async function getAutomationLogin() {
            const user = await api("/user");
            return user.login;
          }

          async function createLabelIfMissing() {
            const body = {
              name: "automation: lcv-auto-pr",
              color: "0969da",
              description: "Managed by LCV branch-to-PR automation",
            };

            try {
              await api(`/repos/${owner}/${repo}/labels`, { method: "POST", body: JSON.stringify(body) });
            } catch (error) {
              if (!String(error.message).includes("422")) {
                throw error;
              }
            }
          }

          function buildBody(pr) {
            const issuedAt = new Date().toISOString();
            const payload = {
              base: "main",
              source: "branch-push",
              repo: repoFull,
              pr_number: pr.number,
              pr_node_id: pr.node_id,
              head_branch: branch,
              head_sha: headSha,
              issued_at: issuedAt,
              nonce: crypto.randomBytes(16).toString("hex"),
            };
            const marker = `<!-- lcv-auto-pr:v3 ${JSON.stringify({ ...payload, sig: sign(payload) })} -->`;
            return [
              "This PR was opened automatically after a verified branch push request.",
              "",
              "Automation:",
              "- direct pushes to main are blocked",
              "- PR checks run normally",
              "- merge happens only after the signed controller verifies every gate",
              "- the source branch is deleted after merge",
              "",
              marker,
            ].join("\n");
          }

          async function listIssueComments(prNumber) {
            const comments = [];
            for (let page = 1; ; page += 1) {
              const batch = await api(`/repos/${owner}/${repo}/issues/${prNumber}/comments?per_page=100&page=${page}`);
              comments.push(...batch);
              if (batch.length < 100) {
                break;
              }
            }
            return comments;
          }

          async function upsertTakeoverWarning(prNumber, automationLogin) {
            const body = [
              takeoverWarningMarker,
              "Automation did not take ownership because this PR was not created or refreshed with a valid LCV automation marker.",
              "Close this PR before re-pushing the branch if automation should own it.",
            ].join("\n");
            const comments = await listIssueComments(prNumber);
            const existing = comments.find(
              (comment) => comment.user?.login === automationLogin && (comment.body || "").includes(takeoverWarningMarker),
            );
            if (existing) {
              await api(`/repos/${owner}/${repo}/issues/comments/${existing.id}`, {
                method: "PATCH",
                body: JSON.stringify({ body }),
              });
            } else {
              await api(`/repos/${owner}/${repo}/issues/${prNumber}/comments`, {
                method: "POST",
                body: JSON.stringify({ body }),
              });
            }
          }

          const automationLogin = await getAutomationLogin();
          const existing = await api(
            `/repos/${owner}/${repo}/pulls?state=open&head=${encodeURIComponent(`${owner}:${branch}`)}&base=main&per_page=10`,
          );

          let pr = existing[0];
          if (pr && !markerIsRefreshable(pr) && !isRecoverablePlaceholder(pr, automationLogin)) {
            await upsertTakeoverWarning(pr.number, automationLogin);
            console.log(`Existing PR #${pr.number} lacks a valid automation marker; not taking ownership.`);
            process.exit(0);
          }

          if (!pr) {
            pr = await api(`/repos/${owner}/${repo}/pulls`, {
              method: "POST",
              body: JSON.stringify({
                title: `chore: merge ${branch}`,
                head: `${owner}:${branch}`,
                base: "main",
                body: placeholderBody,
                maintainer_can_modify: true,
              }),
            });
          }

          const body = buildBody(pr);
          await api(`/repos/${owner}/${repo}/pulls/${pr.number}`, {
            method: "PATCH",
            body: JSON.stringify({ body }),
          });
          await createLabelIfMissing();
          await api(`/repos/${owner}/${repo}/issues/${pr.number}/labels`, {
            method: "POST",
            body: JSON.stringify({ labels: ["automation: lcv-auto-pr"] }),
          });
          await api(`/repos/${owner}/${repo}/dispatches`, {
            method: "POST",
            body: JSON.stringify({
              event_type: "lcv-auto-merge-requested",
              client_payload: {
                pr: pr.number,
                head_sha: headSha,
                head_branch: branch,
              },
            }),
          });

          console.log(`Automation PR ready: #${pr.number}`);
          NODE
