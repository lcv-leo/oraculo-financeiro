name: Ensure Preview Branch

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ensure-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Ensure preview exists
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            try {
              await github.rest.git.getRef({ owner, repo, ref: 'heads/preview' });
              core.info('Branch preview already exists.');
            } catch (error) {
              if (error.status !== 404) throw error;

              const mainRef = await github.rest.git.getRef({ owner, repo, ref: 'heads/main' });
              await github.rest.git.createRef({
                owner,
                repo,
                ref: 'refs/heads/preview',
                sha: mainRef.data.object.sha,
              });
              core.info('Branch preview created from main.');
            }
