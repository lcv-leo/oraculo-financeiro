name: Auto Enable PR Auto-Merge

on:
  pull_request_target:
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  enable-auto-merge:
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    steps:
      - name: Enable auto-merge (squash)
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.graphql(`
                mutation($pullRequestId: ID!) {
                  enablePullRequestAutoMerge(input: {
                    pullRequestId: $pullRequestId,
                    mergeMethod: SQUASH
                  }) {
                    pullRequest {
                      number
                      autoMergeRequest {
                        enabledAt
                      }
                    }
                  }
                }
              `, {
                pullRequestId: context.payload.pull_request.node_id
              });

              core.info(`Auto-merge enabled for PR #${context.payload.pull_request.number}`);
            } catch (error) {
              const msg = String(error && error.message ? error.message : error);
              if (msg.includes('Auto merge is already enabled')) {
                core.info('Auto-merge already enabled.');
              } else {
                core.warning(`Could not enable auto-merge: ${msg}`);
              }
            }
